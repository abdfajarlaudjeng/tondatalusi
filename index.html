<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Edukasi - Kombel Tonda Talusi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .hidden-section { display: none !important; }
        .card-materi { transition: all 0.3s; background: white; border-radius: 20px; border: 1px solid #e2e8f0; }
        .card-materi:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 bg-slate-100 min-h-screen">

    <div id="login-section" class="flex items-center justify-center min-h-[90vh]">
        <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="h-16 mx-auto mb-4">
                <h2 class="text-2xl font-black text-slate-800 uppercase">Portal Belajar<br>Tonda Talusi</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Username" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold transition-all shadow-lg">MASUK</button>
            </div>
        </div>
    </div>

    <div id="main-section" class="container max-w-6xl mx-auto hidden-section">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm gap-4">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="h-10">
                <div>
                    <h1 class="text-xl font-black text-slate-800 uppercase">Kombel Tonda Talusi</h1>
                    <p id="user-info" class="text-blue-600 font-bold text-[10px] uppercase"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showPanel('materi')" class="bg-slate-100 px-4 py-2 rounded-xl font-bold text-sm">📚 Materi</button>
                <button id="nav-penilaian" onclick="showPanel('penilaian')" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl font-bold text-sm hidden-section">📋 Penilaian</button>
                <button id="btn-logout" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold text-sm">Keluar</button>
            </div>
        </div>

        <div id="panel-materi">
            <div id="filter-mapel" class="flex gap-3 mb-8 overflow-x-auto pb-2"></div>
            <div id="materi-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="panel-penilaian" class="hidden-section">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm">
                <h3 class="font-bold mb-6">📋 Daftar Tugas Masuk</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead><tr class="bg-slate-50 border-b"><th class="p-4">Siswa</th><th class="p-4">Mapel</th><th class="p-4">Link</th><th class="p-4">Nilai</th></tr></thead>
                        <tbody id="tabel-penilaian"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="materiModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-[2rem] border-0">
                <div class="modal-body p-8">
                    <h2 id="modalTitle" class="text-2xl font-black mb-4"></h2>
                    <div id="modalDescription" class="mb-6 text-slate-600"></div>
                    <div id="modalMedia" class="mb-8"></div>
                    
                    <div id="form-tugas-siswa" class="border-t pt-6 hidden-section">
                        <h4 class="font-bold mb-3">📤 Kirim Tugas</h4>
                        <input type="text" id="tugas-link" placeholder="Link (Google Drive/Canva)" class="w-full p-3 border rounded-xl mb-3">
                        <button id="btn-submit-tugas" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold w-full">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7b8kFlpUrRevwEl0-onf-anerlJGRLPM",
            authDomain: "datagtkdonggala-7244e.firebaseapp.com",
            projectId: "datagtkdonggala-7244e",
            databaseURL: "https://datagtkdonggala-7244e-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const modalUI = new bootstrap.Modal(document.getElementById('materiModal'));

        let userData = null;
        let currentMateri = null;

        // AUTH
        document.getElementById('btn-login').onclick = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const snap = await get(ref(db, `users/${u}`));
            
            if (snap.exists() && snap.val().password === p) {
                userData = { ...snap.val(), username: u };
                document.getElementById('login-section').classList.add('hidden-section');
                document.getElementById('main-section').classList.remove('hidden-section');
                document.getElementById('user-info').innerText = `${userData.nama} | ${userData.sekolah} | Kelas ${userData.jenjang}`;
                
                if(userData.role !== 'siswa') document.getElementById('nav-penilaian').classList.remove('hidden-section');
                loadSettings();
            } else { alert("Login Gagal!"); }
        };

        function loadSettings() {
            // Load Mapel Filters
            onValue(ref(db, `materi_v2/${userData.jenjang}`), (snap) => {
                const data = snap.val() || {};
                const filterBox = document.getElementById('filter-mapel');
                filterBox.innerHTML = '';
                Object.keys(data).forEach(mapel => {
                    filterBox.innerHTML += `<button onclick="renderMateri('${mapel}')" class="px-6 py-2 bg-white border rounded-xl font-bold shadow-sm whitespace-nowrap">${mapel}</button>`;
                });
            });
        }

        window.renderMateri = (mapel) => {
            onValue(ref(db, `materi_v2/${userData.jenjang}/${mapel}`), (snap) => {
                const container = document.getElementById('materi-container');
                container.innerHTML = '';
                const items = snap.val();
                if(!items) return;
                Object.keys(items).forEach(id => {
                    const m = items[id];
                    container.innerHTML += `
                        <div class="p-6 card-materi border-l-4 border-blue-500">
                            <span class="text-[10px] font-bold text-blue-500 uppercase">${mapel}</span>
                            <h3 class="font-bold text-lg mb-4">${m.judul}</h3>
                            <button onclick="openMateri('${id}', '${mapel}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Buka Materi</button>
                        </div>`;
                });
            });
        };

        window.openMateri = async (id, mapel) => {
            const snap = await get(ref(db, `materi_v2/${userData.jenjang}/${mapel}/${id}`));
            currentMateri = { ...snap.val(), id: id };
            document.getElementById('modalTitle').innerText = currentMateri.judul;
            document.getElementById('modalDescription').innerText = currentMateri.isi;
            document.getElementById('modalMedia').innerHTML = currentMateri.link ? `<a href="${currentMateri.link}" target="_blank" class="block p-4 bg-blue-50 text-blue-600 rounded-xl text-center font-bold">🔗 Buka Lampiran</a>` : '';
            
            if(userData.role === 'siswa') document.getElementById('form-tugas-siswa').classList.remove('hidden-section');
            modalUI.show();
        };

        document.getElementById('btn-submit-tugas').onclick = async () => {
            const link = document.getElementById('tugas-link').value;
            if(!link) return alert("Isi link tugas!");
            await push(ref(db, 'tugas_siswa'), {
                siswa: userData.nama,
                jenjang: userData.jenjang,
                mapel: currentMateri.mapel,
                judulTugas: currentMateri.judul,
                linkTugas: link,
                nilai: "-",
                timestamp: new Date().toLocaleString()
            });
            alert("Tugas Terkirim!");
            modalUI.hide();
        };

        window.showPanel = (id) => {
            ['panel-materi', 'panel-penilaian'].forEach(p => document.getElementById(p).classList.add('hidden-section'));
            document.getElementById('panel-' + id).classList.remove('hidden-section');
            if(id === 'penilaian') loadTugas();
        };

        function loadTugas() {
            onValue(ref(db, 'tugas_siswa'), (snap) => {
                const table = document.getElementById('tabel-penilaian');
                table.innerHTML = '';
                const data = snap.val();
                if(!data) return;
                Object.keys(data).forEach(id => {
                    const t = data[id];
                    if(userData.role !== 'admin' && t.jenjang !== userData.jenjang) return;
                    table.innerHTML += `<tr class="border-b">
                        <td class="p-4 font-bold">${t.siswa}</td>
                        <td class="p-4">${t.mapel}</td>
                        <td class="p-4"><a href="${t.linkTugas}" target="_blank" class="text-blue-600 underline">Buka</a></td>
                        <td class="p-4"><input type="text" value="${t.nilai}" onchange="updateNilai('${id}', this.value)" class="w-12 border rounded text-center"></td>
                    </tr>`;
                });
            });
        }

        window.updateNilai = (id, val) => update(ref(db, `tugas_siswa/${id}`), { nilai: val });
        window.renderMateri = renderMateri; // Expose to global
        document.getElementById('btn-logout').onclick = () => location.reload();

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
